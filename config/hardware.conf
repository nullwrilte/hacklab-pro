# hardware.conf - Configurações de hardware detectadas automaticamente
# Gerado por core/01-gpu-detection.sh — edite com cuidado

# GPU detectada: adreno | mali | mediatek | software
GPU_VENDOR=unknown

# Plataforma do SoC (ex: sm8450, mt6891, exynos2100)
SOC_PLATFORM=unknown

# Driver Mesa ativo: zink | llvmpipe | softpipe
MESA_DRIVER=llvmpipe

# Aceleração por GPU habilitada: true | false
GPU_ACCEL=true

# Quantidade de núcleos de CPU disponíveis
CPU_CORES=4

# RAM total estimada em MB (lida de /proc/meminfo)
RAM_MB=0

# Data da última detecção
DETECTED_AT=
