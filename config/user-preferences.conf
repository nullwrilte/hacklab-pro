# user-preferences.conf - Preferências do usuário
# Gerado por install.sh — pode ser editado manualmente

# Ambiente gráfico: xfce4 | lxqt | i3 | none
DESKTOP=xfce4

# Suporte a Wine para executar binários .exe: true | false
WINE=false

# Aceleração de GPU: true | false
GPU_ACCEL=true

# Idioma do sistema (locale)
LANG=pt_BR.UTF-8

# Tema do terminal: dark | light
THEME=dark

# Iniciar PulseAudio automaticamente: true | false
AUTO_PULSEAUDIO=true

# Iniciar dbus automaticamente: true | false
AUTO_DBUS=true

# Data da instalação
INSTALL_DATE=
