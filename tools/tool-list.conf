# tool-list.conf - Base de dados de ferramentas do HACKLAB-PRO
# Formato: nome:categoria:descrição:cmd_install:cmd_update
# Linhas com # são comentários

# ── Network ──────────────────────────────────────────────────────────────────
nmap:network:Network mapper e scanner de portas:pkg install -y nmap:pkg upgrade -y nmap
tcpdump:network:Captura e análise de pacotes:pkg install -y tcpdump:pkg upgrade -y tcpdump
netcat:network:Canivete suíço de redes (nc):pkg install -y netcat-openbsd:pkg upgrade -y netcat-openbsd
iproute2:network:Ferramentas de rede ip/ss/tc:pkg install -y iproute2:pkg upgrade -y iproute2
dnsutils:network:dig nslookup host:pkg install -y dnsutils:pkg upgrade -y dnsutils
masscan:network:Scanner de portas ultra-rápido:pkg install -y masscan:pkg upgrade -y masscan

# ── Web ───────────────────────────────────────────────────────────────────────
sqlmap:web:Injeção SQL automatizada:pip install sqlmap:pip install --upgrade sqlmap
nikto:web:Scanner de vulnerabilidades web:pkg install -y nikto:pkg upgrade -y nikto
gobuster:web:Brute-force de diretórios e DNS:pkg install -y gobuster:pkg upgrade -y gobuster
ffuf:web:Fuzzer web rápido:pkg install -y ffuf:pkg upgrade -y ffuf
curl:web:Transferência de dados HTTP/S:pkg install -y curl:pkg upgrade -y curl
httpx:web:Probe HTTP multi-thread:pkg install -y httpx:pkg upgrade -y httpx

# ── Exploitation ──────────────────────────────────────────────────────────────
metasploit:exploitation:Framework de exploração:curl -sL https://raw.githubusercontent.com/rapid7/metasploit-omnibus/master/config/templates/metasploit-framework-wrappers/msfupdate.erb | bash:msfupdate
searchsploit:exploitation:Busca no Exploit-DB offline:pkg install -y exploitdb:pkg upgrade -y exploitdb
pwncat:exploitation:Shell reversa avançada:pip install pwncat-cs:pip install --upgrade pwncat-cs

# ── Password ──────────────────────────────────────────────────────────────────
john:password:John the Ripper - quebra de hashes:pkg install -y john:pkg upgrade -y john
hashcat:password:Quebra de hashes acelerada por GPU:pkg install -y hashcat:pkg upgrade -y hashcat
hydra:password:Brute-force de login em serviços:pkg install -y hydra:pkg upgrade -y hydra
crunch:password:Gerador de wordlists:pkg install -y crunch:pkg upgrade -y crunch

# ── Wireless ──────────────────────────────────────────────────────────────────
aircrack-ng:wireless:Suite de auditoria Wi-Fi:pkg install -y aircrack-ng:pkg upgrade -y aircrack-ng
reaver:wireless:Ataque WPS brute-force:pkg install -y reaver:pkg upgrade -y reaver
mdk4:wireless:Testes de stress em redes Wi-Fi:pkg install -y mdk4:pkg upgrade -y mdk4
hcxtools:wireless:Captura e conversão de handshakes:pkg install -y hcxtools:pkg upgrade -y hcxtools

# ── Reverse ───────────────────────────────────────────────────────────────────
ngrok:reverse:Túnel reverso para expor serviços:pkg install -y ngrok:pkg upgrade -y ngrok
chisel:reverse:Túnel TCP/UDP via HTTP:pkg install -y chisel:pkg upgrade -y chisel
socat:reverse:Relay bidirecional de dados:pkg install -y socat:pkg upgrade -y socat

# ── Windows ───────────────────────────────────────────────────────────────────
wine:windows:Executa binários .exe no Android:pkg install -y wine:pkg upgrade -y wine
box64:windows:Emulador x86_64 para ARM:pkg install -y box64:pkg upgrade -y box64

# ── Utils ─────────────────────────────────────────────────────────────────────
git:utils:Controle de versão:pkg install -y git:pkg upgrade -y git
vim:utils:Editor de texto avançado:pkg install -y vim:pkg upgrade -y vim
tmux:utils:Multiplexador de terminal:pkg install -y tmux:pkg upgrade -y tmux
htop:utils:Monitor de processos interativo:pkg install -y htop:pkg upgrade -y htop
python:utils:Python 3 + pip:pkg install -y python:pkg upgrade -y python
jq:utils:Processador de JSON na linha de comando:pkg install -y jq:pkg upgrade -y jq
tree:utils:Lista diretórios em árvore:pkg install -y tree:pkg upgrade -y tree
